<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CryptoVerse | Buy & Sell Cryptocurrency</title>

    <meta name="description"
        content="CryptoVerse is a simple cryptocurrency website that displays live prices of Bitcoin, Ethereum, and Dogecoin. Buy and sell cryptocurrencies with ease.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <nav>
            <img src="images/logo.png" alt="CryptoVerse Logo" class="logo">

            <ul>
                <li><a href="#">Market</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">White Papers</a></li>
                <li><a href="#">About Us</a></li>
            </ul>

            <a href="#" class="btn">EN</a>
        </nav>

        <section class="content">
            <h1>
                BUY & <br>
                SELL <span>Crypto</span>
            </h1>

            <p>
                World's biggest cryptocurrency exchange available on the web
                as well as mobile devices.
            </p>

            <a href="#" class="btn">Explore More</a>
        </section>

        <section class="coin-list">

            <div class="coin">
                <img src="images/bitcoin.png" alt="Bitcoin">

                <div>
                    <h3>$<span id="bitcoin">Loading...</span></h3>
                    <p>Bitcoin</p>
                </div>
            </div>

            <div class="coin">
                <img src="images/ethereum.png" alt="Ethereum">

                <div>
                    <h3>$<span id="ethereum">Loading...</span></h3>
                    <p>Ethereum</p>
                </div>
            </div>

            <div class="coin">
                <img src="images/dogecoin.png" alt="Dogecoin">

                <div>
                    <h3>$<span id="dogecoin">Loading...</span></h3>
                    <p>Dogecoin</p>
                </div>
            </div>

        </section>

    </div>

    <script src="script.js"></script>

</body>
</html>
